AWSTemplateFormatVersion: '2010-09-09'
Description: Temporary S3 bucket in ap-southeast-1 for Textract PDF OCR

Parameters:
  Stage:
    Type: String
    Default: test

Resources:
  TextractTempBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub gongwengpt-textract-temp-${Stage}
      LifecycleConfiguration:
        Rules:
          - Id: DeleteTempOcr
            Status: Enabled
            Prefix: temp-ocr/
            ExpirationInDays: 1

  TextractTempBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TextractTempBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: textract.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${TextractTempBucket.Arn}/*
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub gongwengpt-pipeline-artifacts-sg-${Stage}
      VersioningConfiguration:
        Status: Enabled

Outputs:
  TextractTempBucketName:
    Value: !Ref TextractTempBucket
  PipelineArtifactBucketName:
    Value: !Ref PipelineArtifactBucket
