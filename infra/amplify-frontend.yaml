AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Amplify Frontend Deployment

Parameters:
  GitHubOwner:
    Type: String
    Default: ryucc
  GitHubRepo:
    Type: String
    Default: OfficialDocumentGenerator
  GitHubBranch:
    Type: String
    Default: main
  GitHubToken:
    Type: String
    NoEcho: true
    Description: GitHub personal access token for Amplify
  FrontendDomainName:
    Type: String
    Default: gongwengpt.click
    Description: Custom domain name for frontend
  FrontendCertificateArn:
    Type: String
    Description: ACM certificate ARN from us-east-1 (imported from certificate stack)

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: official-doc-generator-frontend
      Repository: !Sub https://github.com/${GitHubOwner}/${GitHubRepo}
      AccessToken: !Ref GitHubToken
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - cd frontend
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: frontend/dist
            files:
              - '**/*'
          cache:
            paths:
              - frontend/node_modules/**/*
      CustomRules:
        - Source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>'
          Target: /index.html
          Status: '200'
      EnvironmentVariables:
        - Name: VITE_API_BASE_URL
          Value: https://api.gongwengpt.click/api/v1

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref GitHubBranch
      EnableAutoBuild: true
      EnablePullRequestPreview: false

  AmplifyDomain:
    Type: AWS::Amplify::Domain
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      DomainName: !Ref FrontendDomainName
      CertificateSettings:
        CertificateType: CUSTOM
        CustomCertificateArn: !Ref FrontendCertificateArn
      SubDomainSettings:
        - Prefix: ''
          BranchName: !GetAtt AmplifyBranch.BranchName

Outputs:
  AmplifyAppId:
    Description: Amplify App ID
    Value: !GetAtt AmplifyApp.AppId
  AmplifyDefaultDomain:
    Description: Amplify Default Domain
    Value: !Sub ${GitHubBranch}.${AmplifyApp.DefaultDomain}
  AmplifyAppURL:
    Description: Amplify App URL
    Value: !Sub https://${GitHubBranch}.${AmplifyApp.DefaultDomain}
