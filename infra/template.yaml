AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Official Document Generator API

Parameters:
  Stage:
    Type: String
    Default: test
    AllowedValues: [test]
  GitHubOwner:
    Type: String
    Default: ryucc
  GitHubRepo:
    Type: String
    Default: OfficialDocumentGenerator
  GitHubBranch:
    Type: String
    Default: main
  CodeStarConnectionArn:
    Type: String
    Description: ARN of the CodeStar connection to GitHub

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 30

Resources:

  # ---- API ----
  DocumentApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub official-doc-generator-api-${Stage}
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt DocumentUserPool.Arn

  SampleDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub sample-document-${Stage}
      Handler: com.officialpapers.api.handler.SampleDocumentHandler
      CodeUri: ../build/distributions/lambda.zip
      Environment:
        Variables:
          UPLOADED_DOCUMENT_METADATA_TABLE: !Ref UploadedDocumentTable
          UPLOADED_DOCUMENT_BUCKET: !Ref UploadedDocumentBucket
      Policies:
        - Statement:
            - Sid: UploadedDocumentMetadataAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource: !GetAtt UploadedDocumentTable.Arn
            - Sid: UploadedDocumentObjectAccess
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub ${UploadedDocumentBucket.Arn}/*
            - Sid: UploadedDocumentBucketListAccess
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !GetAtt UploadedDocumentBucket.Arn
              Condition:
                StringLike:
                  s3:prefix:
                    - sample-documents/*
      Events:
        ListSampleDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents
            Method: GET
        CreateSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents
            Method: POST
        GetSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}
            Method: GET
        CompleteSampleDocumentUpload:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}/complete
            Method: POST
        GetSampleDocumentDownloadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}/download-url
            Method: GET
        DeleteSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}
            Method: DELETE

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub auth-${Stage}
      Handler: com.officialpapers.api.handler.AuthHandler
      CodeUri: ../build/distributions/lambda.zip
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref DocumentUserPool
          COGNITO_USER_POOL_CLIENT_ID: !Ref DocumentUserPoolClient
      Policies:
        - Statement:
            - Sid: CognitoAuthApiAccess
              Effect: Allow
              Action:
                - cognito-idp:InitiateAuth
                - cognito-idp:RespondToAuthChallenge
                - cognito-idp:ForgotPassword
                - cognito-idp:ConfirmForgotPassword
                - cognito-idp:GlobalSignOut
                - cognito-idp:RevokeToken
                - cognito-idp:GetUser
              Resource: !GetAtt DocumentUserPool.Arn
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/auth/login
            Method: POST
            Auth:
              Authorizer: NONE
        Refresh:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/auth/refresh
            Method: POST
            Auth:
              Authorizer: NONE
        RespondToNewPassword:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/auth/respond-to-new-password
            Method: POST
            Auth:
              Authorizer: NONE
        ForgotPassword:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/auth/forgot-password
            Method: POST
            Auth:
              Authorizer: NONE
        ConfirmForgotPassword:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/auth/confirm-forgot-password
            Method: POST
            Auth:
              Authorizer: NONE
        Logout:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/auth/logout
            Method: POST
            Auth:
              Authorizer: NONE
        GetCurrentUser:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/auth/me
            Method: GET
            Auth:
              Authorizer: NONE

  # ---- DynamoDB ----
  UploadedDocumentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ownerUserId
          AttributeType: S
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: ownerUserId
          KeyType: HASH
        - AttributeName: documentId
          KeyType: RANGE

  # ---- S3 ----
  UploadedDocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedOrigins:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 300

  # ---- Cognito ----
  DocumentUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub official-doc-generator-${Stage}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

  DocumentUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub official-doc-generator-${Stage}-client
      UserPoolId: !Ref DocumentUserPool
      GenerateSecret: false
      EnableTokenRevocation: true
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ---- CodePipeline ----
  ArtifactBucket:
    Type: AWS::S3::Bucket

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelineAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt BuildProject.Arn
              - Effect: Allow
                Action:
                  - cloudformation:*
                  - iam:PassRole
                Resource: '*'
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref CodeStarConnectionArn

  BuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub official-doc-generator-build-${Stage}-${AWS::StackName}
      ServiceRole: !GetAtt BuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ARTIFACT_BUCKET
            Value: !Ref ArtifactBucket
      Source:
        Type: CODEPIPELINE
        BuildSpec: infra/buildspec.yaml

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub official-doc-generator-${Stage}-${AWS::StackName}
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref CodeStarConnectionArn
                FullRepositoryId: !Sub ${GitHubOwner}/${GitHubRepo}
                BranchName: !Ref GitHubBranch
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceOutput
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref BuildProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
        - Name: DeployTest
          Actions:
            - Name: DeployTest
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub official-doc-generator-app-${Stage}
                TemplatePath: BuildOutput::packaged-template.yaml
                Capabilities: CAPABILITY_IAM,CAPABILITY_AUTO_EXPAND
                RoleArn: !GetAtt DeployRole.Arn
                ParameterOverrides: !Sub '{"Stage": "${Stage}"}'
              InputArtifacts:
                - Name: BuildOutput

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub https://${DocumentApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/api/v1/sample-documents
  TableName:
    Value: !Ref UploadedDocumentTable
  BucketName:
    Value: !Ref UploadedDocumentBucket
  UploadedDocumentMetadataTableName:
    Description: DynamoDB table for uploaded document metadata
    Value: !Ref UploadedDocumentTable
  UploadedDocumentBucketName:
    Description: S3 bucket for uploaded source documents
    Value: !Ref UploadedDocumentBucket
  CognitoUserPoolId:
    Description: Cognito user pool identifier
    Value: !Ref DocumentUserPool
  CognitoUserPoolClientId:
    Description: Cognito user pool client identifier
    Value: !Ref DocumentUserPoolClient
