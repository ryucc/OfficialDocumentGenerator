AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Official Document Generator API (App Only)

Parameters:
  Stage:
    Type: String
    Default: test
    AllowedValues: [test]
  ApiDomainName:
    Type: String
    Default: api.gongwengpt.click
    Description: Custom domain name for API Gateway
  HostedZoneId:
    Type: String
    Default: Z08801051G2GR30IAD1A4
    Description: Route 53 Hosted Zone ID for gongwengpt.click

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 30

Resources:
  DocumentApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub official-doc-generator-api-${Stage}
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type'"
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"

  SampleDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub sample-document-${Stage}
      Handler: com.officialpapers.api.handler.SampleDocumentHandler
      CodeUri: ../build/distributions/lambda.zip
      Environment:
        Variables:
          UPLOADED_DOCUMENT_METADATA_TABLE: !Ref UploadedDocumentTable
          UPLOADED_DOCUMENT_BUCKET: !Ref UploadedDocumentBucket
      Policies:
        - Statement:
            - Sid: UploadedDocumentMetadataAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:Scan
              Resource: !GetAtt UploadedDocumentTable.Arn
            - Sid: UploadedDocumentObjectAccess
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub ${UploadedDocumentBucket.Arn}/*
      Events:
        ListSampleDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents
            Method: GET
        CreateSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents
            Method: POST
        GetSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}
            Method: GET
        CompleteSampleDocumentUpload:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}/complete
            Method: POST
        GetSampleDocumentDownloadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}/download-url
            Method: GET
        DeleteSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}
            Method: DELETE

  UploadedDocumentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub sample-documents-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH

  UploadedDocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedOrigins:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 300

  DocumentUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub official-doc-generator-${Stage}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

  DocumentUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub official-doc-generator-${Stage}-client
      UserPoolId: !Ref DocumentUserPool
      GenerateSecret: false

  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref ApiDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref ApiDomainName
          HostedZoneId: !Ref HostedZoneId

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref ApiCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiCustomDomain
      RestApiId: !Ref DocumentApi
      Stage: !Ref DocumentApiProdStage

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub https://${DocumentApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/api/v1/sample-documents
  CustomApiUrl:
    Description: Custom Domain API URL
    Value: !Sub https://${ApiDomainName}/api/v1/sample-documents
  TableName:
    Value: !Ref UploadedDocumentTable
  BucketName:
    Value: !Ref UploadedDocumentBucket
  UploadedDocumentMetadataTableName:
    Description: DynamoDB table for uploaded document metadata
    Value: !Ref UploadedDocumentTable
  UploadedDocumentBucketName:
    Description: S3 bucket for uploaded source documents
    Value: !Ref UploadedDocumentBucket
  CognitoUserPoolId:
    Description: Cognito user pool scaffold identifier
    Value: !Ref DocumentUserPool
  CognitoUserPoolClientId:
    Description: Cognito user pool client scaffold identifier
    Value: !Ref DocumentUserPoolClient
