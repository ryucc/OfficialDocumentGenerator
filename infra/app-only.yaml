AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Official Document Generator API (App Only)

Parameters:
  Stage:
    Type: String
    Default: test
    AllowedValues: [test]
  AllowedEmailSenders:
    Type: CommaDelimitedList
    Default: "shortyliu@gmail.com"
    Description: Comma-separated list of allowed sender email addresses for ai@gongwengpt.click (leave empty to allow all)
  EmailDomainName:
    Type: String
    Default: gongwengpt.click
    Description: Domain name for email receiving
  ApiDomainName:
    Type: String
    Default: api.gongwengpt.click
    Description: Custom domain name for API Gateway
  HostedZoneId:
    Type: String
    Default: Z08801051G2GR30IAD1A4
    Description: Route 53 Hosted Zone ID for gongwengpt.click

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 30

Resources:
  # IAM Role for API Gateway to write CloudWatch Logs
  ApiGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # Set CloudWatch Logs role for API Gateway at account level
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchLogsRole.Arn

  DocumentApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub official-doc-generator-api-${Stage}
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt DocumentUserPool.Arn
        AddDefaultAuthorizerToCorsPreflight: false
      GatewayResponses:
        UNAUTHORIZED:
          StatusCode: 401
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
        ACCESS_DENIED:
          StatusCode: 403
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: '$context.requestId $context.extendedRequestId $context.identity.sourceIp $context.requestTime $context.routeKey $context.status $context.error.message $context.error.messageString $context.authorizer.error'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/official-doc-generator-${Stage}
      RetentionInDays: 7

  SampleDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub sample-document-${Stage}
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures:
        - x86_64
      MemorySize: 128
      CodeUri: ../lambda/sample-documents-api/target/lambda/sample-documents-api/bootstrap.zip
      Environment:
        Variables:
          UPLOADED_DOCUMENT_METADATA_TABLE: !Ref UploadedDocumentTable
          UPLOADED_DOCUMENT_BUCKET: !Ref UploadedDocumentBucket
      Policies:
        - Statement:
            - Sid: UploadedDocumentMetadataAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:Scan
              Resource: !GetAtt UploadedDocumentTable.Arn
            - Sid: UploadedDocumentBucketAccess
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !GetAtt UploadedDocumentBucket.Arn
            - Sid: UploadedDocumentObjectAccess
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub ${UploadedDocumentBucket.Arn}/*
            - Sid: CloudWatchLogsAccess
              Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/sample-document-${Stage}:*
      Events:
        ListSampleDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents
            Method: GET
        CreateSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents
            Method: POST
        GetSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}
            Method: GET
        CompleteSampleDocumentUpload:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}/complete
            Method: POST
        GetSampleDocumentDownloadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}/download-url
            Method: GET
        DeleteSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}
            Method: DELETE

  UploadedDocumentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub sample-documents-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH

  UploadedDocumentBucket:
    Type: AWS::S3::Bucket
    DependsOn: EmailProcessingQueuePolicy
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedOrigins:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 300
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldEmails
            Status: Enabled
            ExpirationInDays: 90
            Prefix: emails/
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt EmailProcessingQueue.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: !Sub emails/${Stage}/

  # Bucket policy to allow SES to write emails to the shared bucket
  UploadedDocumentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UploadedDocumentBucket
      PolicyDocument:
        Statement:
          - Sid: AllowSESPuts
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub ${UploadedDocumentBucket.Arn}/emails/*
            Condition:
              StringEquals:
                AWS:SourceAccount: !Ref AWS::AccountId

  DocumentUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub official-doc-generator-${Stage}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

  DocumentUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub official-doc-generator-${Stage}-client
      UserPoolId: !Ref DocumentUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ---- Email Pipeline Resources ----

  # Lambda function to filter incoming emails by Cognito user list
  EmailFilterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub email-filter-${Stage}
      Runtime: python3.12
      Handler: index.lambda_handler
      CodeUri: ../lambda/email-filter
      Timeout: 30
      Environment:
        Variables:
          USER_POOL_ID: !Ref DocumentUserPool
          EMAIL_BUCKET: !Ref UploadedDocumentBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadedDocumentBucket
        - Statement:
            - Sid: CognitoListUsersAccess
              Effect: Allow
              Action:
                - cognito-idp:ListUsers
              Resource: !GetAtt DocumentUserPool.Arn
            - Sid: CloudWatchLogsAccess
              Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/email-filter-${Stage}:*

  # Lambda permission for SES to invoke the filter function
  EmailFilterFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EmailFilterFunction
      Action: lambda:InvokeFunction
      Principal: ses.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # ---- Email Processing Pipeline (S3 → SQS → Lambda → DynamoDB) ----

  # DynamoDB table to track email processing projects
  ProjectsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub email-projects-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: projectId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: sesMessageId
          AttributeType: S
      KeySchema:
        - AttributeName: projectId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: projectId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: SesMessageIdIndex
          KeySchema:
            - AttributeName: sesMessageId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # DynamoDB table for document generation skills (scripts + schemas + instructions)
  SkillsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub skills-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: skillId
          AttributeType: S
      KeySchema:
        - AttributeName: skillId
          KeyType: HASH
      # DynamoDB fields: skillId, name, description, owner, language, version, schemaJson, createdAt, updatedAt
      # S3 content at skills/{skillId}/: script.* (docx generator), instructions.md (AI prompt)

  # Dead Letter Queue for failed email processing
  EmailProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub email-processing-dlq-${Stage}
      MessageRetentionPeriod: 1209600  # 14 days

  # SQS Queue for email processing
  EmailProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub email-processing-${Stage}
      VisibilityTimeout: 300  # 5 minutes
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailProcessingDLQ.Arn
        maxReceiveCount: 3

  # Queue policy to allow S3 to send messages
  EmailProcessingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EmailProcessingQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt EmailProcessingQueue.Arn
            Condition:
              StringLike:
                aws:SourceArn: !Sub arn:aws:s3:::official-doc-generator-app-*

  # Lambda function to process emails and create projects
  EmailProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub email-processor-${Stage}
      Runtime: python3.12
      Handler: index.lambda_handler
      CodeUri: ../lambda/email-processor
      Timeout: 180
      Environment:
        Variables:
          PROJECTS_TABLE: !Ref ProjectsTable
          SENDER_EMAIL: !Sub ai@${EmailDomainName}
          CLAUDE_MODEL_ID: us.anthropic.claude-haiku-4-5-20251001-v1:0
          BEDROCK_REGION: us-east-1
          DOCUMENT_GENERATOR_FUNCTION: !Ref DocumentGeneratorFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProjectsTable
        - S3ReadPolicy:
            BucketName: !Ref UploadedDocumentBucket
        - SQSPollerPolicy:
            QueueName: !GetAtt EmailProcessingQueue.QueueName
        - Statement:
            - Sid: SESSendEmailAccess
              Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Sid: BedrockInvokeAccess
              Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:*::foundation-model/anthropic.*
                - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.anthropic.*
            - Sid: InvokeDocumentGenerator
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt DocumentGeneratorFunction.Arn
            - Sid: CloudWatchLogsAccess
              Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/email-processor-${Stage}:*
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt EmailProcessingQueue.Arn
            BatchSize: 10

  # Lambda function for document generation (Java)
  DocumentGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub document-generator-${Stage}
      Handler: com.officialpapers.export.DocumentGeneratorHandler
      CodeUri: ../build/distributions/lambda.zip
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          GENERATED_DOCUMENT_BUCKET: !Ref UploadedDocumentBucket
      Policies:
        - Statement:
            - Sid: S3WriteAccess
              Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub ${UploadedDocumentBucket.Arn}/generated-documents/*
            - Sid: CloudWatchLogsAccess
              Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/document-generator-${Stage}:*

  # Lambda function for Projects API (Rust)
  ProjectsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub projects-api-${Stage}
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures:
        - x86_64
      MemorySize: 128
      CodeUri: ../lambda/projects-api-rust/target/lambda/projects-api/bootstrap.zip
      Timeout: 30
      Environment:
        Variables:
          PROJECTS_TABLE: !Ref ProjectsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProjectsTable
        - Statement:
            - Sid: CloudWatchLogsAccess
              Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/projects-api-${Stage}:*
      Events:
        ListProjects:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/projects
            Method: GET

  # Lambda function for Skills API (Rust)
  SkillsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub skills-api-${Stage}
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures:
        - x86_64
      MemorySize: 128
      CodeUri: ../lambda/skills-api/target/lambda/skills-api/bootstrap.zip
      Timeout: 30
      Environment:
        Variables:
          SKILLS_TABLE: !Ref SkillsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SkillsTable
        - Statement:
            - Sid: CloudWatchLogsAccess
              Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/skills-api-${Stage}:*
      Events:
        ListSkills:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/skills
            Method: GET

  # SES Receipt Rule Set
  EmailReceiptRuleSet:
    Type: AWS::SES::ReceiptRuleSet
    Properties:
      RuleSetName: !Sub gongwengpt-email-rules-${Stage}

  # SES Receipt Rule
  EmailReceiptRule:
    Type: AWS::SES::ReceiptRule
    Properties:
      RuleSetName: !Ref EmailReceiptRuleSet
      Rule:
        Name: !Sub receive-ai-emails-${Stage}
        Enabled: true
        ScanEnabled: true
        Recipients:
          - !Sub ai@${EmailDomainName}
        Actions:
          # First: Filter by Lambda
          - LambdaAction:
              FunctionArn: !GetAtt EmailFilterFunction.Arn
              InvocationType: RequestResponse
          # Second: Save to S3 (only if Lambda returns CONTINUE)
          - S3Action:
              BucketName: !Ref UploadedDocumentBucket
              ObjectKeyPrefix: !Sub emails/${Stage}/

  # ---- SES Domain Setup with Custom Resource ----

  # Lambda function for SES setup custom resource
  SESSetupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ses-setup-${Stage}
      Runtime: python3.12
      Handler: index.lambda_handler
      CodeUri: ../lambda/ses-setup
      Timeout: 60
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:VerifyDomainIdentity
                - ses:SetActiveReceiptRuleSet
                - ses:DescribeActiveReceiptRuleSet
              Resource: '*'
            - Sid: CloudWatchLogsAccess
              Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ses-setup-${Stage}:*

  # Custom resource to verify domain and activate rule set
  SESSetup:
    Type: Custom::SESSetup
    DependsOn:
      - EmailReceiptRule
    Properties:
      ServiceToken: !GetAtt SESSetupFunction.Arn
      Domain: !Ref EmailDomainName
      RuleSetName: !Ref EmailReceiptRuleSet

  # ---- Route 53 DNS Records (optional) ----

  # MX Record for receiving emails
  EmailMXRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasHostedZone
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref EmailDomainName
      Type: MX
      TTL: 300
      ResourceRecords:
        - !Sub 10 inbound-smtp.${AWS::Region}.amazonaws.com

  # TXT Record for SES domain verification
  EmailVerificationRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasHostedZone
    DependsOn: SESSetup
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub _amazonses.${EmailDomainName}
      Type: TXT
      TTL: 300
      ResourceRecords:
        - !Sub '"${SESSetup.VerificationToken}"'

  # ---- API Custom Domain Resources ----

  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref ApiDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref ApiDomainName
          HostedZoneId: !Ref HostedZoneId

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref ApiCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiCustomDomain
      RestApiId: !Ref DocumentApi
      Stage: Prod

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

Conditions:
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, ""]]

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub https://${DocumentApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/api/v1/sample-documents
  CustomApiUrl:
    Description: Custom Domain API URL
    Value: !Sub https://${ApiDomainName}/api/v1/sample-documents
  TableName:
    Value: !Ref UploadedDocumentTable
  BucketName:
    Value: !Ref UploadedDocumentBucket
  UploadedDocumentMetadataTableName:
    Description: DynamoDB table for uploaded document metadata
    Value: !Ref UploadedDocumentTable
  UploadedDocumentBucketName:
    Description: S3 bucket for uploaded source documents
    Value: !Ref UploadedDocumentBucket
  CognitoUserPoolId:
    Description: Cognito user pool ID
    Value: !Ref DocumentUserPool
  CognitoUserPoolClientId:
    Description: Cognito user pool client ID
    Value: !Ref DocumentUserPoolClient
  CognitoRegion:
    Description: AWS region for Cognito
    Value: !Ref AWS::Region
  EmailReceiptRuleSetName:
    Description: SES Receipt Rule Set name
    Value: !Ref EmailReceiptRuleSet
  EmailFilterFunctionName:
    Description: Lambda function for filtering emails
    Value: !Ref EmailFilterFunction
  EmailAddress:
    Description: Email address for receiving emails
    Value: !Sub ai@${EmailDomainName}
  SESVerificationToken:
    Description: SES domain verification token (already applied if HostedZoneId provided)
    Value: !GetAtt SESSetup.VerificationToken
  ProjectsTableName:
    Description: DynamoDB table for email processing projects
    Value: !Ref ProjectsTable
  EmailProcessingQueueUrl:
    Description: SQS queue URL for email processing
    Value: !Ref EmailProcessingQueue
  EmailProcessorFunctionName:
    Description: Lambda function for processing emails
    Value: !Ref EmailProcessorFunction
  SkillsTableName:
    Description: DynamoDB table for document generation skills
    Value: !Ref SkillsTable
