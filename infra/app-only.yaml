AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Official Document Generator API (App Only)

Parameters:
  Stage:
    Type: String
    Default: test
    AllowedValues: [test]
  AllowedEmailSenders:
    Type: CommaDelimitedList
    Default: "shortyliu@gmail.com"
    Description: Comma-separated list of allowed sender email addresses for ai@gongwengpt.click (leave empty to allow all)
  DomainName:
    Type: String
    Default: gongwengpt.click
    Description: Domain name for email receiving
  Route53HostedZoneId:
    Type: String
    Description: Route 53 Hosted Zone ID for the domain (leave empty to skip DNS setup)
    Default: ""

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 30

Resources:
  DocumentApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub official-doc-generator-api-${Stage}
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type'"
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"

  SampleDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub sample-document-${Stage}
      Handler: com.officialpapers.api.handler.SampleDocumentHandler
      CodeUri: ../build/distributions/lambda.zip
      Environment:
        Variables:
          UPLOADED_DOCUMENT_METADATA_TABLE: !Ref UploadedDocumentTable
          UPLOADED_DOCUMENT_BUCKET: !Ref UploadedDocumentBucket
      Policies:
        - Statement:
            - Sid: UploadedDocumentMetadataAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:Scan
              Resource: !GetAtt UploadedDocumentTable.Arn
            - Sid: UploadedDocumentObjectAccess
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub ${UploadedDocumentBucket.Arn}/*
      Events:
        ListSampleDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents
            Method: GET
        CreateSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents
            Method: POST
        GetSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}
            Method: GET
        CompleteSampleDocumentUpload:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}/complete
            Method: POST
        GetSampleDocumentDownloadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}/download-url
            Method: GET
        DeleteSampleDocument:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentApi
            Path: /api/v1/sample-documents/{documentId}
            Method: DELETE

  UploadedDocumentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub sample-documents-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH

  UploadedDocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedOrigins:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 300
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldEmails
            Status: Enabled
            ExpirationInDays: 90
            Prefix: emails/

  # Bucket policy to allow SES to write emails to the shared bucket
  UploadedDocumentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UploadedDocumentBucket
      PolicyDocument:
        Statement:
          - Sid: AllowSESPuts
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub ${UploadedDocumentBucket.Arn}/emails/*
            Condition:
              StringEquals:
                AWS:SourceAccount: !Ref AWS::AccountId

  DocumentUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub official-doc-generator-${Stage}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

  DocumentUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub official-doc-generator-${Stage}-client
      UserPoolId: !Ref DocumentUserPool
      GenerateSecret: false

  # ---- Email Pipeline Resources ----

  # Lambda function to filter incoming emails by allowlist
  EmailFilterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub email-filter-${Stage}
      Runtime: python3.12
      Handler: index.lambda_handler
      CodeUri: ../lambda/email-filter
      Timeout: 30
      Environment:
        Variables:
          ALLOWED_SENDERS: !Join [',', !Ref AllowedEmailSenders]
          EMAIL_BUCKET: !Ref UploadedDocumentBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadedDocumentBucket

  # Lambda permission for SES to invoke the filter function
  EmailFilterFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EmailFilterFunction
      Action: lambda:InvokeFunction
      Principal: ses.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # DynamoDB table to track received emails
  ReceivedEmailTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub received-emails-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: messageId
          AttributeType: S
        - AttributeName: receivedAt
          AttributeType: S
      KeySchema:
        - AttributeName: messageId
          KeyType: HASH
        - AttributeName: receivedAt
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Lambda function to log email metadata
  EmailMetadataFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub email-metadata-${Stage}
      Runtime: python3.12
      Handler: index.lambda_handler
      CodeUri: ../lambda/email-metadata
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref ReceivedEmailTable
          EMAIL_BUCKET: !Ref UploadedDocumentBucket
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReceivedEmailTable
        - S3ReadPolicy:
            BucketName: !Ref UploadedDocumentBucket
      Events:
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref UploadedDocumentBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: !Sub emails/${Stage}/

  # SES Receipt Rule Set
  EmailReceiptRuleSet:
    Type: AWS::SES::ReceiptRuleSet
    Properties:
      RuleSetName: !Sub gongwengpt-email-rules-${Stage}

  # SES Receipt Rule
  EmailReceiptRule:
    Type: AWS::SES::ReceiptRule
    Properties:
      RuleSetName: !Ref EmailReceiptRuleSet
      Rule:
        Name: !Sub receive-ai-emails-${Stage}
        Enabled: true
        ScanEnabled: true
        Recipients:
          - !Sub ai@${DomainName}
        Actions:
          # First: Filter by Lambda
          - LambdaAction:
              FunctionArn: !GetAtt EmailFilterFunction.Arn
              InvocationType: RequestResponse
          # Second: Save to S3 (only if Lambda returns CONTINUE)
          - S3Action:
              BucketName: !Ref UploadedDocumentBucket
              ObjectKeyPrefix: !Sub emails/${Stage}/

  # ---- SES Domain Setup with Custom Resource ----

  # Lambda function for SES setup custom resource
  SESSetupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ses-setup-${Stage}
      Runtime: python3.12
      Handler: index.lambda_handler
      CodeUri: ../lambda/ses-setup
      Timeout: 60
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:VerifyDomainIdentity
                - ses:SetActiveReceiptRuleSet
                - ses:DescribeActiveReceiptRuleSet
              Resource: '*'

  # Custom resource to verify domain and activate rule set
  SESSetup:
    Type: Custom::SESSetup
    DependsOn:
      - EmailReceiptRule
    Properties:
      ServiceToken: !GetAtt SESSetupFunction.Arn
      Domain: !Ref DomainName
      RuleSetName: !Ref EmailReceiptRuleSet

  # ---- Route 53 DNS Records (optional) ----

  # MX Record for receiving emails
  EmailMXRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasHostedZone
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Ref DomainName
      Type: MX
      TTL: 300
      ResourceRecords:
        - !Sub 10 inbound-smtp.${AWS::Region}.amazonaws.com

  # TXT Record for SES domain verification
  EmailVerificationRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasHostedZone
    DependsOn: SESSetup
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Sub _amazonses.${DomainName}
      Type: TXT
      TTL: 300
      ResourceRecords:
        - !Sub '"${SESSetup.VerificationToken}"'

Conditions:
  HasHostedZone: !Not [!Equals [!Ref Route53HostedZoneId, ""]]

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub https://${DocumentApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/api/v1/sample-documents
  TableName:
    Value: !Ref UploadedDocumentTable
  BucketName:
    Value: !Ref UploadedDocumentBucket
  UploadedDocumentMetadataTableName:
    Description: DynamoDB table for uploaded document metadata
    Value: !Ref UploadedDocumentTable
  UploadedDocumentBucketName:
    Description: S3 bucket for uploaded source documents
    Value: !Ref UploadedDocumentBucket
  CognitoUserPoolId:
    Description: Cognito user pool scaffold identifier
    Value: !Ref DocumentUserPool
  CognitoUserPoolClientId:
    Description: Cognito user pool client scaffold identifier
    Value: !Ref DocumentUserPoolClient
  ReceivedEmailTableName:
    Description: DynamoDB table for received email metadata
    Value: !Ref ReceivedEmailTable
  EmailReceiptRuleSetName:
    Description: SES Receipt Rule Set name
    Value: !Ref EmailReceiptRuleSet
  EmailFilterFunctionName:
    Description: Lambda function for filtering emails
    Value: !Ref EmailFilterFunction
  EmailAddress:
    Description: Email address for receiving emails
    Value: !Sub ai@${DomainName}
  SESVerificationToken:
    Description: SES domain verification token (already applied if Route53HostedZoneId provided)
    Value: !GetAtt SESSetup.VerificationToken
