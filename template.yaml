AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Official Document Generator API

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 30

Resources:
  InstructionMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: instructionId
          AttributeType: S
      KeySchema:
        - AttributeName: instructionId
          KeyType: HASH

  InstructionContentBucket:
    Type: AWS::S3::Bucket

  DocumentInstructionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.officialpapers.api.handler.DocumentInstructionHandler
      CodeUri: build/distributions/lambda.zip
      Environment:
        Variables:
          INSTRUCTION_METADATA_TABLE: !Ref InstructionMetadataTable
          INSTRUCTION_CONTENT_BUCKET: !Ref InstructionContentBucket
      Policies:
        - Statement:
            - Sid: InstructionMetadataAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:Scan
              Resource: !GetAtt InstructionMetadataTable.Arn
            - Sid: InstructionContentAccess
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub ${InstructionContentBucket.Arn}/*
      Events:
        ListInstructions:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions
            Method: GET
        CreateInstruction:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions
            Method: POST
        GetInstruction:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions/{instructionId}
            Method: GET
        UpdateInstruction:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions/{instructionId}
            Method: PUT
        DeleteInstruction:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions/{instructionId}
            Method: DELETE

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/api/v1/document-instructions
  InstructionMetadataTableName:
    Description: DynamoDB table for instruction metadata
    Value: !Ref InstructionMetadataTable
  InstructionContentBucketName:
    Description: S3 bucket for instruction content
    Value: !Ref InstructionContentBucket
