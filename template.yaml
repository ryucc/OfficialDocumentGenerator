AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Official Document Generator API

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 30

Resources:
  DocumentInstructionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.officialpapers.api.handler.DocumentInstructionHandler
      CodeUri: build/distributions/lambda.zip
      Events:
        ListInstructions:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions
            Method: GET
        CreateInstruction:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions
            Method: POST
        GetInstruction:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions/{instructionId}
            Method: GET
        UpdateInstruction:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions/{instructionId}
            Method: PUT
        DeleteInstruction:
          Type: Api
          Properties:
            Path: /api/v1/document-instructions/{instructionId}
            Method: DELETE

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/api/v1/document-instructions
