server:
  port: 8080

spring:
  application:
    name: official-paper-gpt

  datasource:
    url: jdbc:h2:mem:officialpaperdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

logging:
  level:
    com.officialpapers.api: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  info:
    title: Official Document Generator API
    version: 0.1.0
    description: API for managing document-writing instructions
  servers:
    - url: https://api.example.com/v1
      description: Production
    - url: https://staging-api.example.com/v1
      description: Staging
    - url: http://localhost:8080/api/v1
      description: Local Development

---

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/officialpaperdb}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  h2:
    console:
      enabled: false

logging:
  level:
    com.officialpapers.api: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
