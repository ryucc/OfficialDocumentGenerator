openapi: 3.1.0
info:
  title: Official Document Generator API
  version: 0.2.0
  summary: API for Cognito authentication and user-scoped sample documents
  description: |
    This API supports email/password authentication backed by Amazon Cognito and
    a user-scoped file library for sample official documents.

servers:
  - url: http://127.0.0.1:3000/api/v1
    description: Local SAM
  - url: https://api.example.com/api/v1
    description: Production
  - url: https://staging-api.example.com/api/v1
    description: Staging

tags:
  - name: Authentication
  - name: Sample Documents

paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: Exchange email and password for Cognito tokens or a first-login challenge
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /auth/respond-to-new-password:
    post:
      tags: [Authentication]
      summary: Complete a Cognito NEW_PASSWORD_REQUIRED login challenge
      operationId: respondToNewPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RespondToNewPasswordRequest'
      responses:
        '200':
          description: Challenge completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access and ID tokens
      operationId: refreshTokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Begin password reset
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '204':
          description: Password reset accepted for delivery
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /auth/confirm-forgot-password:
    post:
      tags: [Authentication]
      summary: Confirm password reset with a verification code
      operationId: confirmForgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmForgotPasswordRequest'
      responses:
        '204':
          description: Password reset successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke the current session
      operationId: logout
      security:
        - CognitoBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Session revoked successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /auth/me:
    get:
      tags: [Authentication]
      summary: Return the current authenticated user
      operationId: getCurrentUser
      security:
        - CognitoBearerAuth: []
      responses:
        '200':
          description: Current user returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /sample-documents:
    get:
      tags: [Sample Documents]
      summary: List uploaded sample documents for the authenticated user
      operationId: listSampleDocuments
      security:
        - CognitoBearerAuth: []
      responses:
        '200':
          description: Documents returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleDocumentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Sample Documents]
      summary: Create an upload session for an authenticated user's sample document
      operationId: createSampleDocument
      security:
        - CognitoBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSampleDocumentRequest'
      responses:
        '201':
          description: Upload session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSampleDocumentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sample-documents/{documentId}:
    get:
      tags: [Sample Documents]
      summary: Get a user-scoped sample document metadata record
      operationId: getSampleDocument
      security:
        - CognitoBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Document returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Sample Documents]
      summary: Delete a user-scoped sample document
      operationId: deleteSampleDocument
      security:
        - CognitoBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '204':
          description: Document deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sample-documents/{documentId}/complete:
    post:
      tags: [Sample Documents]
      summary: Finalize a user-scoped sample document upload
      operationId: completeSampleDocumentUpload
      security:
        - CognitoBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Upload finalized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sample-documents/{documentId}/download-url:
    get:
      tags: [Sample Documents]
      summary: Create a presigned download URL for a user-scoped sample document
      operationId: getSampleDocumentDownloadUrl
      security:
        - CognitoBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Download URL created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadTarget'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    CognitoBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication is required or has failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    TooManyRequests:
      description: Too many authentication requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ServiceUnavailable:
      description: Authentication provider is temporarily unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    SampleDocumentStatus:
      type: string
      enum:
        - PENDING_UPLOAD
        - AVAILABLE

    SampleDocument:
      type: object
      required:
        - id
        - filename
        - contentType
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
        status:
          $ref: '#/components/schemas/SampleDocumentStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SampleDocumentListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SampleDocument'

    CreateSampleDocumentRequest:
      type: object
      required:
        - filename
        - contentType
      additionalProperties: false
      properties:
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
          minimum: 0

    UploadTarget:
      type: object
      required:
        - uploadUrl
        - uploadMethod
        - uploadHeaders
        - expiresAt
      properties:
        uploadUrl:
          type: string
          format: uri
        uploadMethod:
          type: string
        uploadHeaders:
          type: object
          additionalProperties:
            type: string
        expiresAt:
          type: string
          format: date-time

    CreateSampleDocumentResponse:
      type: object
      required:
        - document
        - upload
      properties:
        document:
          $ref: '#/components/schemas/SampleDocument'
        upload:
          $ref: '#/components/schemas/UploadTarget'

    DownloadTarget:
      type: object
      required:
        - downloadUrl
        - downloadMethod
        - expiresAt
      properties:
        downloadUrl:
          type: string
          format: uri
        downloadMethod:
          type: string
        expiresAt:
          type: string
          format: date-time

    EmailRequest:
      type: object
      required:
        - email
      additionalProperties: false
      properties:
        email:
          type: string
          format: email

    LoginRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required:
        - refreshToken
      additionalProperties: false
      properties:
        refreshToken:
          type: string

    RespondToNewPasswordRequest:
      type: object
      required:
        - email
        - newPassword
        - session
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        newPassword:
          type: string
        session:
          type: string

    ConfirmForgotPasswordRequest:
      type: object
      required:
        - email
        - confirmationCode
        - newPassword
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        confirmationCode:
          type: string
        newPassword:
          type: string

    AuthTokens:
      type: object
      required:
        - accessToken
        - idToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
        idToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int32

    AuthChallenge:
      type: object
      required:
        - challengeName
        - session
        - email
      properties:
        challengeName:
          type: string
          enum:
            - NEW_PASSWORD_REQUIRED
        session:
          type: string
        email:
          type: string
          format: email

    LoginResult:
      type: object
      additionalProperties: false
      properties:
        tokens:
          $ref: '#/components/schemas/AuthTokens'
        challenge:
          $ref: '#/components/schemas/AuthChallenge'

    CurrentUser:
      type: object
      required:
        - userId
        - emailVerified
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        emailVerified:
          type: boolean

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
