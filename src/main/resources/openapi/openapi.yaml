openapi: 3.1.0
info:
  title: Official Document Generator API
  version: 0.1.0
  summary: API for managing uploaded sample documents
  description: |
    This API supports a dropbox-style file library for sample official documents.

    The current browser client is intentionally scoped to the phase-1 document flow:
    list uploaded sample documents, create an upload session, upload the binary to the
    returned presigned URL, finalize the upload, request a download URL, and delete a
    document. Chat history and document rename/replace endpoints are not part of the
    published contract yet and should be treated as future work.

servers:
  - url: http://127.0.0.1:3000/api/v1
    description: Local SAM
  - url: https://api.example.com/api/v1
    description: Production
  - url: https://staging-api.example.com/api/v1
    description: Staging

tags:
  - name: Sample Documents

paths:
  /sample-documents:
    get:
      tags: [Sample Documents]
      summary: List uploaded sample documents
      description: Returns the metadata ledger consumed by the current frontend document table.
      operationId: listSampleDocuments
      responses:
        '200':
          description: Documents returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleDocumentListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Sample Documents]
      summary: Create an upload session for a sample document
      description: |
        Creates a metadata record in `PENDING_UPLOAD` state and returns a presigned upload
        target. The client must upload the binary to `upload.uploadUrl` and then call
        `POST /sample-documents/{documentId}/complete`.
      operationId: createSampleDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSampleDocumentRequest'
      responses:
        '201':
          description: Upload session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSampleDocumentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sample-documents/{documentId}:
    get:
      tags: [Sample Documents]
      summary: Get a sample document metadata record
      operationId: getSampleDocument
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Document returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Sample Documents]
      summary: Delete an uploaded sample document
      operationId: deleteSampleDocument
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '204':
          description: Document deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sample-documents/{documentId}/complete:
    post:
      tags: [Sample Documents]
      summary: Finalize a sample document upload
      description: Marks a previously created upload session as available after the object exists in storage.
      operationId: completeSampleDocumentUpload
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Upload finalized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sample-documents/{documentId}/download-url:
    get:
      tags: [Sample Documents]
      summary: Create a presigned download URL for a sample document
      description: Returns a temporary download target for an `AVAILABLE` document.
      operationId: getSampleDocumentDownloadUrl
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Download URL created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadTarget'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    SampleDocumentStatus:
      type: string
      enum:
        - PENDING_UPLOAD
        - AVAILABLE

    SampleDocument:
      type: object
      required:
        - id
        - filename
        - contentType
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
        status:
          $ref: '#/components/schemas/SampleDocumentStatus'
        textObjectKey:
          type: string
          description: S3 key of the extracted text file (.txt)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SampleDocumentListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SampleDocument'

    CreateSampleDocumentRequest:
      type: object
      required:
        - filename
        - contentType
      additionalProperties: false
      properties:
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
          minimum: 0

    UploadTarget:
      type: object
      required:
        - uploadUrl
        - uploadMethod
        - uploadHeaders
        - expiresAt
      properties:
        uploadUrl:
          type: string
          format: uri
        uploadMethod:
          type: string
        uploadHeaders:
          type: object
          additionalProperties:
            type: string
        expiresAt:
          type: string
          format: date-time

    CreateSampleDocumentResponse:
      type: object
      required:
        - document
        - upload
      properties:
        document:
          $ref: '#/components/schemas/SampleDocument'
        upload:
          $ref: '#/components/schemas/UploadTarget'

    DownloadTarget:
      type: object
      required:
        - downloadUrl
        - downloadMethod
        - expiresAt
      properties:
        downloadUrl:
          type: string
          format: uri
        downloadMethod:
          type: string
        expiresAt:
          type: string
          format: date-time

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
